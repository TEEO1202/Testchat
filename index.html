<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat P2P Seguro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        #chat { height: 300px; border: 1px solid #ddd; background: white; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        input { padding: 10px; width: 70%; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px; border-radius: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        #qrcode { margin: 20px 0; }
    </style>
</head>
<body>
    <h3>Tu ID de conexión:</h3>
    <p id="my-id" style="font-weight: bold; color: #d9534f;">Cargando ID...</p>
    <div id="qrcode"></div> <hr>
    <input type="text" id="dest-id" placeholder="Pega el ID de tu amigo">
    <button onclick="conectar()">Conectar</button>

    <div id="chat"></div>
    <input type="text" id="msg" placeholder="Escribe un mensaje encriptado...">
    <button onclick="enviar()">Enviar</button>

    <script>
        const peer = new Peer();
        let conn;
        const clave = "Secret123"; // Ambos deben tener la misma

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            // Generar QR automáticamente con tu ID
            new QRCode(document.getElementById("qrcode"), {
                text: id, width: 128, height: 128
            });
        });

        peer.on('connection', c => {
            conn = c;
            alert("¡Alguien se ha conectado!");
            configurarConexion();
        });

        function conectar() {
            const idDestino = document.getElementById('dest-id').value;
            conn = peer.connect(idDestino);
            configurarConexion();
        }

        function configurarConexion() {
            conn.on('data', data => {
                const bytes = CryptoJS.AES.decrypt(data, clave);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                document.getElementById('chat').innerHTML += `<div style="color:blue"><b>Amigo:</b> ${original}</div>`;
            });
        }

        function enviar() {
            const m = document.getElementById('msg').value;
            const cifrado = CryptoJS.AES.encrypt(m, clave).toString();
            conn.send(cifrado);
            document.getElementById('chat').innerHTML += `<div><b>Tú:</b> ${m}</div>`;
            document.getElementById('msg').value = "";
        }
    </script>
</body>
</html>
