<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado: Hielo</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #e5ddd5; max-width: 400px; margin: auto; }
        #chat { height: 400px; border: 1px solid #ccc; background: #fff; overflow-y: auto; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .controls { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { width: 100%; padding: 10px; background: #075e54; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 8px; max-width: 80%; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Sala: <span id="room-name" style="color:#075e54">hielo</span></h3>
        <p id="status" style="font-size: 12px; color: orange;">Conectando al servidor...</p>
        <button id="btn-conectar" onclick="unirseASala()">1. Entrar a la Sala</button>
    </div>

    <div id="chat" style="margin-top: 10px;"></div>

    <div class="controls">
        <input type="text" id="msg" placeholder="Escribe un mensaje...">
        <button onclick="enviarMensaje()">2. Enviar</button>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const PALABRA_SALA = "hielo"; // <--- Cambia esto si quieres otra sala
        const CLAVE_CIFRADO = "hielo"; 
        
        // Usamos un sufijo para evitar que choque con otros usuarios de PeerJS en el mundo
        // Puedes probar solo con "hielo", pero si falla, usa algo como "hielo-v1"
        const miID = PALABRA_SALA + "-dispositivo-" + Math.floor(Math.random() * 999);
        const peer = new Peer(miID, { debug: 2 });

        let conn;

        peer.on('open', id => {
            document.getElementById('status').innerText = "Listo. Tu ID efímero es: " + id;
            document.getElementById('status').style.color = "green";
        });

        // Escuchar cuando el OTRO dispositivo nos conecta
        peer.on('connection', c => {
            conn = c;
            vincularEventos();
        });

        function unirseASala() {
            // En este modelo simple, el segundo que entra "llama" al primero.
            // Para que funcione, deberías poner el ID que aparece en la otra pantalla.
            const idAmigo = prompt("Introduce el ID que ves en la otra pantalla:");
            if (idAmigo) {
                conn = peer.connect(idAmigo);
                vincularEventos();
            }
        }

        function vincularEventos() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "🤝 ¡Conectado con éxito!";
                document.getElementById('status').style.color = "blue";
            });

            conn.on('data', data => {
                const bytes = CryptoJS.AES.decrypt(data, CLAVE_CIFRADO);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                mostrarMensaje(original, 'received');
            });
        }

        function enviarMensaje() {
            const texto = document.getElementById('msg').value;
            if (conn && conn.open && texto) {
                const cifrado = CryptoJS.AES.encrypt(texto, CLAVE_CIFRADO).toString();
                conn.send(cifrado);
                mostrarMensaje(texto, 'sent');
                document.getElementById('msg').value = "";
            } else {
                alert("Aún no estás conectado con el otro dispositivo.");
            }
        }

        function mostrarMensaje(txt, tipo) {
            const div = document.createElement('div');
            div.classList.add('msg', tipo);
            div.innerText = txt;
            document.getElementById('chat').appendChild(div);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }
    </script>
</body>
</html>
