<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado Persistente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        /* Pantalla de Bloqueo */
        #lock-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #f0f0f0; }
        .lock-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        
        /* Área de Chat */
        #chat-container { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; word-wrap: break-word; position: relative; }
        .sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #ddd; }
        
        .footer { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; }
        input { padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        #msg-input { flex: 1; }
        
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .btn-lock { background: #d9534f; font-size: 12px; padding: 5px 15px; }
    </style>
</head>
<body>

<header>
    <span>SALA HIELO</span>
    <button id="lock-btn" class="btn-lock" onclick="bloquearChat()" style="display:none;">Bloquear ahora</button>
</header>

<div id="lock-screen">
    <div class="lock-card">
        <h3>Acceso Protegido</h3>
        <input type="password" id="pass-val" placeholder="Palabra clave (te)">
        <br><br>
        <button onclick="validarAcceso()">Entrar</button>
    </div>
</div>

<div id="chat-container">
    <div id="chat"></div>
    <div class="footer">
        <input type="text" id="msg-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUGs48sNP_JRhQeDYObeCSWBEgl8lGKW5zDBieatE_AiDLmAt58U5c6-47SGOEd7Xy/exec";
    const CLAVE_ACCESO = "te";
    const CLAVE_CIFRADO = "hielo";
    let tiempoInactividad;

    // 1. Validar Palabra Clave
    function validarAcceso() {
        const pass = document.getElementById('pass-val').value;
        if (pass.toLowerCase() === CLAVE_ACCESO) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('lock-btn').style.display = 'block';
            resetearTemporizador();
            cargarHistorial();
        } else {
            alert("Acceso denegado");
        }
    }

    // 2. Bloquear Chat
    function bloquearChat() {
        document.getElementById('lock-screen').style.display = 'flex';
        document.getElementById('chat-container').style.display = 'none';
        document.getElementById('lock-btn').style.display = 'none';
        document.getElementById('pass-val').value = "";
        document.getElementById('chat').innerHTML = ""; // Limpiar vista por privacidad
    }

    // 3. Temporizador de Auto-bloqueo (5 minutos)
    function resetearTemporizador() {
        clearTimeout(tiempoInactividad);
        tiempoInactividad = setTimeout(bloquearChat, 5 * 60 * 1000); // 5 minutos
    }

    // Detectar actividad para resetear el tiempo
    window.onload = resetearTemporizador;
    document.onmousemove = resetearTemporizador;
    document.onkeypress = resetearTemporizador;

    // 4. Cargar Historial desde Google Sheets
    async function cargarHistorial() {
        if (document.getElementById('chat-container').style.display === 'none') return;
        
        try {
            const res = await fetch(GAS_URL);
            const filas = await res.json();
            const chat = document.getElementById('chat');
            chat.innerHTML = ""; 

            filas.forEach((fila, index) => {
                if (index === 0 || !fila[2]) return; // Saltar encabezados o filas vacías
                try {
                    const bytes = CryptoJS.AES.decrypt(fila[2], CLAVE_CIFRADO);
                    const texto = bytes.toString(CryptoJS.enc.Utf8);
                    if (texto) addMsg(texto, 'received');
                } catch(e) {}
            });
        } catch (error) {
            console.error("Error al cargar:", error);
        }
    }

    // 5. Enviar Mensaje
    async function enviar() {
        const input = document.getElementById('msg-input');
        const m = input.value;
        if (!m) return;

        const cifrado = CryptoJS.AES.encrypt(m, CLAVE_CIFRADO).toString();
        addMsg(m, 'sent');
        input.value = "";
        resetearTemporizador();

        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ user: "Usuario", msg: cifrado })
        });
    }

    function addMsg(txt, tipo) {
        const div = document.createElement('div');
        div.className = `msg ${tipo}`;
        div.innerText = txt;
        const chatDiv = document.getElementById('chat');
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // Actualizar historial cada 15 segundos automáticamente
    setInterval(cargarHistorial, 15000);
</script>

</body>
</html>
