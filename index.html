<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado Permanente</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; font-size: 15px; }
        .sent { background: #dcf8c6; align-self: flex-end; border: 1px solid #c0e0a0; }
        .received { background: #fff; align-self: flex-start; border: 1px solid #ddd; }
        .footer { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        #status { font-size: 11px; background: #fff3cd; color: #856404; text-align: center; padding: 5px; }
    </style>
</head>
<body>

<header>SALA: HIELO</header>
<div id="status">Iniciando conexión...</div>
<div id="chat"></div>

<div class="footer">
    <input type="text" id="msg" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviar()">
    <button onclick="enviar()">Enviar</button>
</div>

<script>
    const SALA_ID = "sala-hielo-teeo"; // ID único para ustedes dos
    const CLAVE = "hielo"; 
    let peer, conn;

    // Intentamos ser el "Dueño" de la sala
    function iniciarPeer() {
        peer = new Peer(SALA_ID);

        peer.on('open', id => {
            updateStatus("Esperando al otro usuario...");
        });

        // Si somos el dueño, esperamos a que el otro se conecte
        peer.on('connection', c => {
            conn = c;
            conectarEventos();
        });

        // ERROR: Si el ID ya existe, significa que el otro ya entró primero
        peer.on('error', err => {
            if (err.type === 'unavailable-id') {
                updateStatus("Sala ocupada, entrando como invitado...");
                conectarComoInvitado();
            } else {
                console.error(err);
            }
        });
    }

    function conectarComoInvitado() {
        // Creamos un ID aleatorio para nosotros y nos conectamos a la SALA_ID
        peer = new Peer(); 
        peer.on('open', () => {
            conn = peer.connect(SALA_ID);
            conectarEventos();
        });
    }

    function conectarEventos() {
        conn.on('open', () => {
            updateStatus("🟢 En línea");
            document.getElementById('status').style.background = "#d4edda";
            document.getElementById('status').style.color = "#155724";
        });

        conn.on('data', data => {
            const bytes = CryptoJS.AES.decrypt(data, CLAVE);
            const texto = bytes.toString(CryptoJS.enc.Utf8);
            addMsg(texto, 'received');
        });

        conn.on('close', () => {
            updateStatus("🔴 Desconectado. Refresca para reintentar.");
        });
    }

    function enviar() {
        const input = document.getElementById('msg');
        const m = input.value;
        if (conn && conn.open && m) {
            const cifrado = CryptoJS.AES.encrypt(m, CLAVE).toString();
            conn.send(cifrado);
            addMsg(m, 'sent');
            input.value = "";
        }
    }

    function addMsg(txt, tipo) {
        const div = document.createElement('div');
        div.className = `msg ${tipo}`;
        div.innerText = txt;
        const chat = document.getElementById('chat');
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function updateStatus(txt) {
        document.getElementById('status').innerText = txt;
    }

    iniciarPeer();
</script>

</body>
</html>
