<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Memoria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 14px; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: #fff; align-self: flex-start; border: 1px solid #ddd; }
        .footer { background: #f0f0f0; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        button { background: #075e54; color: white; border: none; padding: 10px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="chat"> Cargando mensajes antiguos...</div>

<div class="footer">
    <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
    <button onclick="enviar()">Enviar</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUGs48sNP_JRhQeDYObeCSWBEgl8lGKW5zDBieatE_AiDLmAt58U5c6-47SGOEd7Xy/exec"; // <--- PEGA AQUÍ TU URL
    const CLAVE = "hielo";

    // 1. Cargar mensajes al abrir la sala
    async function cargarHistorial() {
        const res = await fetch(GAS_URL);
        const filas = await res.json();
        const chat = document.getElementById('chat');
        chat.innerHTML = ""; // Limpiar cargando
        
        filas.forEach(fila => {
            if(!fila[2]) return;
            try {
                const bytes = CryptoJS.AES.decrypt(fila[2], CLAVE);
                const texto = bytes.toString(CryptoJS.enc.Utf8);
                if(texto) addMsg(texto, 'received');
            } catch(e) {}
        });
    }

    // 2. Enviar mensaje a Google Sheets
    async function enviar() {
        const input = document.getElementById('msg-input');
        const m = input.value;
        if (!m) return;

        const cifrado = CryptoJS.AES.encrypt(m, CLAVE).toString();
        addMsg(m, 'sent');
        input.value = "";

        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ user: "Usuario", msg: cifrado })
        });
    }

    function addMsg(txt, tipo) {
        const div = document.createElement('div');
        div.className = `msg ${tipo}`;
        div.innerText = txt;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }

    cargarHistorial();
    // Refrescar cada 10 segundos por si el otro escribió
    setInterval(cargarHistorial, 10000); 
</script>
</body>
</html>
</body>
</html>
