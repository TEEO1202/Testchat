<!DOCTYPE html>
<html>
<head>
    <title>Chat P2P Encriptado</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h3>Tu ID: <span id="my-id">...</span></h3>
    <input type="text" id="dest-id" placeholder="ID del amigo">
    <button onclick="conectar()">Conectar</button>
    <br><br>
    <div id="chat" style="height:200px; border:1px solid #ccc; overflow:y-scroll"></div>
    <input type="text" id="msg" placeholder="Mensaje secreto">
    <button onclick="enviar()">Enviar</button>

    <script>
        const peer = new Peer(); // Crea tu identidad
        let conn;
        const clave = "MiClaveSecreta123"; // En un caso real, ambos deben conocerla

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Al recibir una conexión
        peer.on('connection', c => {
            conn = c;
            configurarConexion();
        });

        function conectar() {
            const idDestino = document.getElementById('dest-id').value;
            conn = peer.connect(idDestino);
            configurarConexion();
        }

        function configurarConexion() {
            conn.on('data', data => {
                // DESENCRIPTAR al recibir
                const bytes = CryptoJS.AES.decrypt(data, clave);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                document.getElementById('chat').innerHTML += `<p>Amigo: ${original}</p>`;
            });
        }

        function enviar() {
            const m = document.getElementById('msg').value;
            // ENCRIPTAR antes de enviar
            const cifrado = CryptoJS.AES.encrypt(m, clave).toString();
            conn.send(cifrado);
            document.getElementById('chat').innerHTML += `<p>Tú: ${m}</p>`;
        }
    </script>
</body>
</html>
